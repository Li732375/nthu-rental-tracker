name: 📰 招租快訊自動爬蟲

on:
  # 每週一 UTC 12:00（台灣時間 20:00）自動執行，考量執行時差 
  schedule:
    - cron: "42 10 * * 1"

  # 支援手動觸發
  workflow_dispatch:

# 授予寫入權限以便 commit & push
permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      # 1. 簽出程式碼
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Python 環境
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. 安裝依賴套件
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # 4. 執行爬蟲
      - name: 🕷️ Run crawler
        id: crawler
        run: python crawler.py

      # 5. 提交並推送變更
      - name: 📝 Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json README.md
          # 僅在有變更時才 commit
          git diff --staged --quiet || git commit -m "🔄 自動更新招租快訊（$(date '+%Y-%m-%d')）"
          git push

      # 6️⃣ ✅ 成功通知 LINE
      - name: ✅ Notify LINE (Success)
        if: success()
        run: |
          curl -X POST https://api.line.me/v2/bot/message/push \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.LINE_TOKEN }}" \
          -d "{
            \"to\": \"${{ secrets.LINE_USER_ID }}\",
            \"messages\":[
              {
                \"type\":\"text\",
                \"text\":\"✅ 招租快訊\n📊 結果: ${{ steps.crawler.outputs.summary }}\n🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n⏰ 時間: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')\"
              }
            ]
          }"

      # 7️⃣ ❌ 失敗通知 LINE
      - name: ❌ Notify LINE (Failure)
        if: failure()
        run: |
          curl -X POST https://api.line.me/v2/bot/message/push \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.LINE_TOKEN }}" \
          -d "{
            \"to\": \"${{ secrets.LINE_USER_ID }}\",
            \"messages\":[
              {
                \"type\":\"text\",
                \"text\":\"❌ 招租快訊\n🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n⏰ 時間: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')\"
              }
            ]
          }"
