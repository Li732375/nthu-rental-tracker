name: 📰 招租快訊自動爬蟲

on:
  # 每週一 UTC 12:00（台灣時間 20:00）自動執行
  schedule:
    - cron: "0 12 * * 1"

  # 支援手動觸發
  workflow_dispatch:

# 授予寫入權限以便 commit & push
permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      # 1. 簽出程式碼
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Python 環境
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. 安裝依賴套件
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # 4. 執行爬蟲
      - name: 🕷️ Run crawler
        run: python crawler.py

      # 5. 提交並推送變更
      - name: 📝 Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json README.md
          # 僅在有變更時才 commit
          git diff --staged --quiet || git commit -m "🔄 自動更新招租快訊（$(date '+%Y-%m-%d')）"
          git push
